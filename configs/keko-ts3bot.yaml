# =============================================================================
# Kellerkompanie TeamSpeak 3 Bot Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# TeamSpeak 3 Server Query Connection
# -----------------------------------------------------------------------------
ts3:
  host: "127.0.0.1"
  port: 10011
  user: "kellerkompanie-root"
  password: "password"
  nickname: "Kellerkompanie Bot"
  default_channel: "TechSupport / RapeDungeon"
  server_id: 1

# -----------------------------------------------------------------------------
# Webpage API
# -----------------------------------------------------------------------------
# All persistent state (account links, authkeys, welcome messages, squad.xml)
# lives in the kellerkompanie-webpage. The bot is a thin TS3 client and reaches
# the webpage exclusively through /teamspeak/* HTTP endpoints.
api:
  # Base URL of the kellerkompanie-webpage instance.
  base_url: "http://localhost:8000"

  # Shared bearer token. MUST match `ts3bot_api_token` in the webpage's
  # keko-webpage.yaml. Rotate by updating both sides simultaneously.
  token: "change-me"

  # Request timeout in seconds for any single API call.
  timeout: 10.0

  # The guest-welcome message is fetched from the webpage admin UI on demand.
  # Cache it for this many seconds to avoid hammering the webpage every time
  # a guest connects.
  guest_welcome_cache_seconds: 300.0
